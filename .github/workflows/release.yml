name: Release

# Manual release: from the GitHub "Actions" tab pick "Release", click
# "Run workflow", enter the version tag, and it builds the Windows installer
# .exe plus Linux .deb, .rpm, portable tarball, and checksum artifacts, then
# publishes a GitHub Release with everything attached and auto-generated notes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. v0.3.2.1 (the tag is created at the current commit on this branch)'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a pre-release'
        required: false
        default: false
        type: boolean

# Needed for the release job to create the tag and the GitHub Release.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stamp the requested version onto package.json so the produced artifact
      # carries it. Not committed back — it only affects this build.
      - name: Set version from input
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/stamp-version.js "${VERSION#v}"

      - name: Configure Windows code signing
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WIN_CSC_LINK" ] && [ -n "$WIN_CSC_KEY_PASSWORD" ]; then
            {
              printf 'WIN_CSC_LINK=%s\n' "$WIN_CSC_LINK"
              printf 'WIN_CSC_KEY_PASSWORD=%s\n' "$WIN_CSC_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "Windows code signing secrets not configured; building unsigned."
          fi

      - name: Package Windows installer .exe
        run: npm run package:windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: releases/*.exe
          if-no-files-found: error

  build-linux-deb:
    name: Build Linux Debian package and portable archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Set version from input
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/stamp-version.js "${VERSION#v}"

      - name: Package Debian release artifacts
        run: npm run package:linux:deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-and-portable
          path: build/artifacts
          if-no-files-found: error

  build-linux-rpm:
    name: Build Linux RPM package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from input
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/stamp-version.js "${VERSION#v}"

      - name: Package RPM in Fedora
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            fedora:42 \
            bash -lc 'dnf --assumeyes install rpm-build nodejs npm findutils tar coreutils && bash tests/integration/linux/package-rpm.test.sh && npm run package:linux:rpm'
          sudo chown -R "$(id -u):$(id -g)" build/artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: build/artifacts
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux-deb, build-linux-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: find dist -type f -printf '%s\t%p\n'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          flags=()
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi
          mapfile -t assets < <(find dist -type f \( \
            -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o \
            -name '*.tar.gz' -o -name '*.sha256' \
          \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release artifacts were downloaded." >&2
            exit 1
          fi
          gh release create "$TAG" \
            "${assets[@]}" \
            --title "StepForge $TAG" \
            --target "${{ github.sha }}" \
            --generate-notes \
            "${flags[@]}"
